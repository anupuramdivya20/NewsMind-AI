{% include 'navbar.html' %}

<!DOCTYPE html>
<html>
<head>
    <title>My Bookmarks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
            margin:0;
            padding:0;
        }

        .page-title{
            text-align:center;
            margin:30px 0 15px 0;
            color:#222;
        }

        .top-actions{
            text-align:center;
            margin-bottom:20px;
        }

        .home-btn{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            text-decoration:none;
        }

        .news-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:25px;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .news-image{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:15px;
        }

        .title{
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
            color:#222;
        }

        .source{
            color:#777;
            margin-bottom:15px;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-right:8px;
            font-size:14px;
        }

        .open-btn{
            background:#007bff;
            color:white;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
        }

        .empty-msg{
            text-align:center;
            font-size:18px;
            color:#666;
            margin-top:40px;
        }
    </style>
</head>

<body>

<h1 class="page-title">⭐ My Saved Articles</h1>

<div class="top-actions">
    <a href="{{ url_for('home') }}" class="home-btn">⬅ Back to Home</a>
</div>

{% if bookmarks and bookmarks|length > 0 %}
<div class="news-grid">

    {% for item in bookmarks %}
    <div class="card">

        <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c"
             class="news-image"
             alt="Bookmark Image">

        <div class="content">

            <div class="title">
                {{ item[1] }}
            </div>

            <div class="source">
                Source: {{ item[3] }}
            </div>

            <a href="{{ url_for('article_page') }}?title={{ item[1]|urlencode }}&source={{ item[3]|urlencode }}&url={{ item[2]|urlencode }}">
                <button class="btn open-btn">Read Article</button>
            </a>

            <a href="{{ url_for('delete_bookmark_route', bookmark_id=item[0]) }}">
                <button class="btn delete-btn">Delete</button>
            </a>

        </div>
    </div>
    {% endfor %}

</div>
{% else %}
    <div class="empty-msg">No bookmarks saved yet.</div>
{% endif %}

</body>
</html>
