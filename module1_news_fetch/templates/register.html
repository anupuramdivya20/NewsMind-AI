<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial,sans-serif;
        }

        .container{
            width:450px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:6px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#0056b3;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
            margin-bottom:8px;
        }

        .interest-box{
            border:1px solid #ddd;
            border-radius:6px;
            padding:12px;
            max-height:250px;
            overflow-y:auto;
            background:#fafafa;
        }

        .interest-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px 15px;
        }

        .interest-item{
            display:flex;
            align-items:center;
            gap:8px;
            font-size:14px;
        }

        .interest-item input[type="checkbox"]{
            width:auto;
            margin:0;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    {% if message %}
    <p style="color:red;text-align:center;">
        {{ message }}
    </p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Email.."
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <input
            type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            required
        >

        <label>Select Interests</label>
        <div class="interest-box">
            <div class="interest-grid">
                <label class="interest-item"><input type="checkbox" name="interest" value="technology"> Technology</label>
                
                <label class="interest-item"><input type="checkbox" name="interest" value="business"> Business</label>

                <label class="interest-item"><input type="checkbox" name="interest" value="sports"> Sports</label>

                <label class="interest-item"><input type="checkbox" name="interest" value="health"> Health</label>

                <label class="interest-item"><input type="checkbox" name="interest" value="entertainment"> Entertainment</label>

                

                <label class="interest-item"><input type="checkbox" name="interest" value="politics"> Politics</label>

            </div>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>

</div>

</body>
</html>
