<style>
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 25px;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #ff6f61;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 14px;
}

.nav-links a:hover {
    background: #ff6f61;
    transform: translateY(-2px);
}

.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    top: 35px;
    background: black;
    color: white;
    min-width: 180px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.dropdown-content a {
    display: block;
    padding: 10px;
    color: white;
}

.dropdown-content a:hover {
    background: #333;
}

.dropdown:hover .dropdown-content {
    display: block;
}

.auth-btn {
    background: #ff6f61;
    padding: 8px 12px;
    border-radius: 20px;
    font-weight: bold;
}

/* SEARCH BAR */
.search-form {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 10px;
}

.search-form input {
    padding: 8px 12px;
    border: none;
    border-radius: 20px;
    outline: none;
    width: 220px;
    font-size: 14px;
}

.search-form button {
    padding: 8px 14px;
    border: none;
    border-radius: 20px;
    background: #ff6f61;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.search-form button:hover {
    background: #e65b50;
}

@media (max-width: 768px) {
    .nav-links {
        flex-direction: column;
        position: absolute;
        right: 10px;
        top: 60px;
        background: #1f1f2e;
        padding: 10px;
        border-radius: 10px;
        width: 90%;
    }

    .search-form {
        width: 100%;
        margin-bottom: 10px;
    }

    .search-form input {
        width: 100%;
    }
}
</style>

<div class="navbar">

    <div class="logo">AI Powered News Digest Agent</div>

    <div class="nav-links">

        <!-- SEARCH BAR -->
        <form 
            class="search-form"
            method="GET"
            action="{% if session.get('user') %}{{ url_for('home') }}{% else %}{{ url_for('guest') }}{% endif %}"
        >
            <input 
                type="text" 
                name="query" 
                placeholder="Search news..." 
                value="{{ request.args.get('query', '') }}"
            >
            <button type="submit">Search</button>
        </form>

        <!-- Home dynamic -->
        <a href="{% if session.get('user') %}{{ url_for('home') }}{% else %}{{ url_for('guest') }}{% endif %}">
            Home
        </a>

        <a href="{{ url_for('trending') }}">Trending</a>

        {% if session.get('user') %}
            <a href="{{ url_for('bookmarks') }}">Bookmarks</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="auth-btn">Login</a>
            <a href="{{ url_for('register') }}" class="auth-btn">Register</a>
        {% endif %}

    </div>

</div>
